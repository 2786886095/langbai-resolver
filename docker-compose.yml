services:
  media-harbor-api:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      MEDIA_HARBOR_INSTANCE_TOKEN: "${MEDIA_HARBOR_INSTANCE_TOKEN:?set a random token of at least 32 bytes}"
      MEDIA_HARBOR_CORS_ORIGINS: "${MEDIA_HARBOR_CORS_ORIGINS:-http://127.0.0.1:8787,http://localhost:8787}"
      MEDIA_HARBOR_MAX_CONCURRENT_JOBS: "${MEDIA_HARBOR_MAX_CONCURRENT_JOBS:-2}"
      MEDIA_HARBOR_MAX_PENDING_JOBS: "${MEDIA_HARBOR_MAX_PENDING_JOBS:-32}"
      MEDIA_HARBOR_JOB_TIMEOUT_SECONDS: "${MEDIA_HARBOR_JOB_TIMEOUT_SECONDS:-3600}"
      MEDIA_HARBOR_JOB_TTL_SECONDS: "${MEDIA_HARBOR_JOB_TTL_SECONDS:-21600}"
      MEDIA_HARBOR_MAX_DOWNLOAD_BYTES: "${MEDIA_HARBOR_MAX_DOWNLOAD_BYTES:-8589934592}"
      MEDIA_HARBOR_MAX_TOTAL_STORAGE_BYTES: "${MEDIA_HARBOR_MAX_TOTAL_STORAGE_BYTES:-34359738368}"
      MEDIA_HARBOR_ALLOW_PEER_TO_PEER: "${MEDIA_HARBOR_ALLOW_PEER_TO_PEER:-false}"
    volumes:
      - media-harbor-downloads:/data/downloads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  media-harbor-downloads:
