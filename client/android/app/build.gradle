plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def signingProperties = new Properties()
def signingPropertiesFile = rootProject.file("key.properties")
def hasReleaseSigning = signingPropertiesFile.exists()
if (hasReleaseSigning) {
    signingProperties.load(new FileInputStream(signingPropertiesFile))
}

def releaseTaskRequested = gradle.startParameter.taskNames.any {
    it.toLowerCase(Locale.ROOT).contains("release")
}
if (releaseTaskRequested && !hasReleaseSigning) {
    throw new GradleException(
        "Release signing is required. Create android/key.properties; debug signing fallback is disabled."
    )
}

android {
    namespace = "com.langbai.mediaharbor"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.langbai.mediaharbor"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        // The embedded Python/yt-dlp runtime requires Android 7.0 or newer.
        minSdk = 24
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    packagingOptions {
        jniLibs {
            // The embedded yt-dlp/FFmpeg executables must be extracted so the
            // runtime can execute them on Android 7+.
            useLegacyPackaging = true
            // These files are executable archives packaged with a .so suffix,
            // not ELF libraries, so llvm-strip must leave them untouched.
            keepDebugSymbols += ["**/*.zip.so"]
        }
    }

    lint {
        // local.properties is generated by Flutter/Android tooling and is not
        // committed. Keep PropertyEscape enabled for every tracked file.
        lintConfig = rootProject.file("lint.xml")
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                keyAlias = signingProperties["keyAlias"]
                keyPassword = signingProperties["keyPassword"]
                storeFile = file(signingProperties["storeFile"])
                storePassword = signingProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            // Never publish a build signed with the debug key: Android will reject
            // it as an update to an existing production installation.
            if (hasReleaseSigning) {
                signingConfig = signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation "io.github.junkfood02.youtubedl-android:library:0.18.1"
    implementation "io.github.junkfood02.youtubedl-android:ffmpeg:0.18.1"
    implementation "androidx.documentfile:documentfile:1.1.0"
    testImplementation "junit:junit:4.13.2"
}

flutter {
    source = "../.."
}
