name: Publish unsigned Windows Setup

on:
  workflow_dispatch:
    inputs:
      version:
        description: Existing release version without v prefix
        required: true

permissions:
  contents: write

concurrency:
  group: langbai-unsigned-windows
  cancel-in-progress: false

env:
  RELEASE_VERSION_INPUT: ${{ inputs.version }}
  UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/update-manifest.json

jobs:
  windows:
    name: Build, smoke-test and publish unsigned Setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.0"
          channel: stable
      - name: Validate requested release version
        shell: pwsh
        run: |
          python scripts/resolve_release_version.py --pubspec client/pubspec.yaml --github-env "$env:GITHUB_ENV"
          gh release view "v$env:RELEASE_VERSION_INPUT" --repo "$env:GITHUB_REPOSITORY" | Out-Null
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Install pinned packaging tools
        shell: pwsh
        run: |
          choco install innosetup --version=6.7.1 -y --no-progress
          choco install ffmpeg --version=8.1.2 -y --no-progress
          choco install aria2 --version=1.37.0 -y --no-progress
      - name: Build unsigned Windows Setup
        shell: pwsh
        run: >-
          & ./scripts/build_windows_setup.ps1
          -Version $env:RELEASE_VERSION
          -UpdateManifestUrl $env:UPDATE_MANIFEST_URL
      - name: Smoke-test unsigned Setup
        shell: pwsh
        run: >-
          & ./scripts/test_windows_setup.ps1
          -SetupPath ./dist/langbai-resolver-Setup.exe
          -AllowUnsigned
      - name: Publish Setup to the existing release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "v$env:RELEASE_VERSION"
          ./dist/langbai-resolver-Setup.exe
          --repo "$env:GITHUB_REPOSITORY"
          --clobber
