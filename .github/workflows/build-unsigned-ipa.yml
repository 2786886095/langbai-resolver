name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "scripts/prepare_ios_local_parser.sh"
      - "scripts/read_project_version.py"
      - ".github/workflows/build-unsigned-ipa.yml"

permissions:
  contents: read

concurrency:
  group: unsigned-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/update-manifest.json

jobs:
  build:
    name: Analyze, test and build unsigned iOS artifact
    runs-on: macos-14
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Read project version
        run: python ../scripts/read_project_version.py --pubspec pubspec.yaml --github-env "$GITHUB_ENV"
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Prepare embedded iOS Python and yt-dlp
        run: bash ../scripts/prepare_ios_local_parser.sh
      - name: Build iOS app without signing
        run: |
          flutter build ios --release --no-codesign --config-only --build-name "$APP_VERSION" --build-number "$APP_BUILD_NUMBER" --dart-define="APP_VERSION=$APP_VERSION" --dart-define="UPDATE_MANIFEST_URL=$UPDATE_MANIFEST_URL"
          cd ios
          pod install
          cd ..
          flutter build ios --release --no-codesign --build-name "$APP_VERSION" --build-number "$APP_BUILD_NUMBER" --dart-define="APP_VERSION=$APP_VERSION" --dart-define="UPDATE_MANIFEST_URL=$UPDATE_MANIFEST_URL"
      - name: Package unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ipa/Payload/
          cd build/ipa
          ditto -c -k --sequesterRsrc --keepParent Payload langbai-resolver-unsigned.ipa
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: langbai-resolver-unsigned-ipa
          path: client/build/ipa/langbai-resolver-unsigned.ipa
          if-no-files-found: error
          retention-days: 7
