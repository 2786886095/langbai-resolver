name: Build desktop, Android and Web clients

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "installer/**"
      - "backend/**"
      - "scripts/build_windows_setup.ps1"
      - ".github/workflows/build-clients.yml"

env:
  APP_VERSION: "1.0.8"
  UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/update-manifest.json

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test
      - name: Configure persistent Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/langbai-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=langbai-release.jks\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" \
            > android/key.properties
      - run: >-
          flutter build apk --release --split-per-abi
          --build-name "${APP_VERSION}"
          --dart-define="APP_VERSION=${APP_VERSION}"
          --dart-define="UPDATE_MANIFEST_URL=${UPDATE_MANIFEST_URL}"
      - name: Verify persistent Android signing certificate
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          "$APKSIGNER" verify --print-certs build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            | grep -qi '52e5db5df541b3c974320ffe336299ff886ffcd31cf0fa6aedcc02006ba5c8ff'
      - uses: actions/upload-artifact@v4
        with:
          name: langbai-resolver-Android
          path: client/build/app/outputs/flutter-apk/*-release.apk

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - shell: pwsh
        run: choco install innosetup ffmpeg aria2 -y --no-progress
      - shell: pwsh
        run: >-
          & ../scripts/build_windows_setup.ps1
          -Version "$env:APP_VERSION"
          -UpdateManifestUrl "$env:UPDATE_MANIFEST_URL"
      - uses: actions/upload-artifact@v4
        with:
          name: langbai-resolver-Windows-Setup
          path: dist/langbai-resolver-Setup.exe
          if-no-files-found: error

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: >-
          flutter build web --release
          --dart-define="APP_VERSION=${APP_VERSION}"
          --dart-define="UPDATE_MANIFEST_URL=${UPDATE_MANIFEST_URL}"
      - uses: actions/upload-artifact@v4
        with:
          name: langbai-resolver-Web
          path: client/build/web
