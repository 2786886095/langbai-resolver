name: Build desktop, Android and Web clients

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "installer/**"
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/build-clients.yml"

permissions:
  contents: read

concurrency:
  group: clients-${{ github.ref }}
  cancel-in-progress: true

env:
  UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/update-manifest.json
  WEB_API_BASE_URL: ${{ vars.WEB_API_BASE_URL }}

jobs:
  android:
    name: Analyze, test and build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Read project version
        run: python ../scripts/read_project_version.py --pubspec pubspec.yaml --github-env "$GITHUB_ENV"
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Lint Android application module
        run: bash ./android/gradlew --project-dir android :app:lintDebug --no-daemon
      - name: Configure persistent Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/langbai-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=langbai-release.jks\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" \
            > android/key.properties
      - run: >-
          flutter build apk --release --split-per-abi
          --build-name "$APP_VERSION"
          --build-number "$APP_BUILD_NUMBER"
          --dart-define="APP_VERSION=$APP_VERSION"
          --dart-define="UPDATE_MANIFEST_URL=$UPDATE_MANIFEST_URL"
      - name: Verify persistent Android signing certificate
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          "$APKSIGNER" verify --print-certs build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            | grep -qi '52e5db5df541b3c974320ffe336299ff886ffcd31cf0fa6aedcc02006ba5c8ff'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: langbai-resolver-Android
          path: client/build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error
          retention-days: 7

  windows:
    name: Build and smoke-test signed Windows Setup
    if: ${{ vars.ENABLE_WINDOWS_SIGNED_BUILD == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Read project version
        run: python scripts/read_project_version.py --pubspec client/pubspec.yaml --github-env "$env:GITHUB_ENV"
      - name: Install pinned packaging tools
        shell: pwsh
        run: |
          choco install innosetup --version=6.7.1 -y --no-progress
          choco install ffmpeg --version=8.1.2 -y --no-progress
          choco install aria2 --version=1.37.0 -y --no-progress
      - name: Decode Windows signing certificate
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_BASE64)) {
            throw 'WINDOWS_SIGNING_CERTIFICATE_BASE64 is required for Setup artifacts.'
          }
          [IO.File]::WriteAllBytes(
            (Join-Path $env:RUNNER_TEMP 'langbai-signing.pfx'),
            [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERTIFICATE_BASE64)
          )
      - name: Build signed Windows Setup
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: >-
          & ./scripts/build_windows_setup.ps1
          -Version $env:APP_VERSION
          -UpdateManifestUrl $env:UPDATE_MANIFEST_URL
          -SigningCertificatePath (Join-Path $env:RUNNER_TEMP 'langbai-signing.pfx')
          -SigningCertificatePassword $env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD
          -RequireSignedInstaller
      - name: Smoke-test signed Setup
        shell: pwsh
        run: >-
          & ./scripts/test_windows_setup.ps1
          -SetupPath ./dist/langbai-resolver-Setup.exe
          -ExpectedSignerSha256 (Get-Content ./dist/windows-signing-cert-sha256.txt -Raw)
      - name: Remove signing certificate
        if: always()
        shell: pwsh
        run: Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP 'langbai-signing.pfx') -Force -ErrorAction SilentlyContinue
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: langbai-resolver-Windows-Setup
          path: |
            dist/langbai-resolver-Setup.exe
            dist/windows-signing-cert-sha256.txt
          if-no-files-found: error
          retention-days: 7

  web:
    name: Analyze, test and build Web
    if: ${{ vars.WEB_API_BASE_URL != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Read project version and validate Web service
        run: |
          python ../scripts/read_project_version.py --pubspec pubspec.yaml --github-env "$GITHUB_ENV"
          python -c "import os, urllib.parse; u=urllib.parse.urlparse(os.environ.get('WEB_API_BASE_URL','')); assert u.scheme == 'https' and u.netloc, 'WEB_API_BASE_URL repository variable must be a public HTTPS URL'"
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: >-
          flutter build web --release
          --dart-define="APP_VERSION=$APP_VERSION"
          --dart-define="API_BASE_URL=$WEB_API_BASE_URL"
          --dart-define="UPDATE_MANIFEST_URL=$UPDATE_MANIFEST_URL"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: langbai-resolver-Web
          path: client/build/web
          if-no-files-found: error
          retention-days: 7
