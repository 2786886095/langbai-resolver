name: Build desktop, Android and Web clients

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "installer/**"
      - "backend/**"
      - "scripts/build_windows_setup.ps1"
      - ".github/workflows/build-clients.yml"

env:
  APP_VERSION: "1.0.4"
  UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/update-manifest.json

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test
      - run: >-
          flutter build apk --release --split-per-abi
          --build-name "${APP_VERSION}"
          --dart-define="APP_VERSION=${APP_VERSION}"
          --dart-define="UPDATE_MANIFEST_URL=${UPDATE_MANIFEST_URL}"
      - uses: actions/upload-artifact@v4
        with:
          name: langbai-resolver-Android
          path: client/build/app/outputs/flutter-apk/*-release.apk

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - shell: pwsh
        run: choco install innosetup ffmpeg aria2 -y --no-progress
      - shell: pwsh
        run: >-
          & ../scripts/build_windows_setup.ps1
          -Version "$env:APP_VERSION"
          -UpdateManifestUrl "$env:UPDATE_MANIFEST_URL"
      - uses: actions/upload-artifact@v4
        with:
          name: langbai-resolver-Windows-Setup
          path: dist/langbai-resolver-Setup.exe
          if-no-files-found: error

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: >-
          flutter build web --release
          --dart-define="APP_VERSION=${APP_VERSION}"
          --dart-define="UPDATE_MANIFEST_URL=${UPDATE_MANIFEST_URL}"
      - uses: actions/upload-artifact@v4
        with:
          name: langbai-resolver-Web
          path: client/build/web
